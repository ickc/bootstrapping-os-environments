name: test-installers

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  # Run the compiled curl|python3 installers end-to-end on every supported
  # platform. Platform support lives in the installers themselves (each script
  # skips cleanly via the `test` action on an unsupported platform), so this
  # matrix only needs the runners that map to a supported `$(uname -sm)`:
  #   ubuntu-latest   -> Linux-x86_64
  #   ubuntu-24.04-arm -> Linux-aarch64
  #   macos-latest    -> Darwin-arm64
  #   macos-26-intel  -> Darwin-x86_64
  # Looping over install/*.py keeps this generic as more installers are added.
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: fresh install and test
        shell: bash
        run: |
          set -euo pipefail
          # mamba_env.py defaults to the micromamba backend, so micromamba must be
          # installed before mamba_env runs. The C-sorted loop below orders
          # micromamba *after* mamba_env, so install it explicitly first; the loop
          # then no-ops it ("already installed").
          python3 install/micromamba.py install
          # Sort explicitly with C locale to guarantee alphabetical byte order
          # (APFS/HFS+ filesystem ordering is not alphabetical).
          for script in $(printf '%s\n' install/*.py | LC_ALL=C sort); do
            echo "::group::${script}"
            python3 "${script}" install
            python3 "${script}" test
            echo "::endgroup::"
          done

      - name: idempotency check — install skips when already present
        shell: bash
        run: |
          set -euo pipefail
          for script in $(printf '%s\n' install/*.py | LC_ALL=C sort); do
            echo "::group::${script}"
            out=$(python3 "${script}" install)
            echo "${out}"
            echo "${out}" | grep -qE "already installed|already exists" || \
              { echo "FAIL: ${script} install should skip when already present"; exit 1; }
            echo "::endgroup::"
          done

      - name: update and test
        shell: bash
        run: |
          set -euo pipefail
          # mamba_env is included now: it defaults to the micromamba backend, and
          # `micromamba env update --prune` (unlike mamba's) does not exec Python
          # from the target env for platform detection, so it works even on the
          # Python-less system env.
          for script in $(printf '%s\n' install/*.py | LC_ALL=C sort); do
            echo "::group::${script}"
            python3 "${script}" update
            python3 "${script}" test
            echo "::endgroup::"
          done

      - name: reinstall and test
        shell: bash
        run: |
          set -euo pipefail
          # All installers, mamba_env included. reinstall = uninstall + a fresh
          # create. micromamba was placed in the fresh-install step and is only
          # reinstalled later in this same C-sorted loop, so mamba_env's reinstall
          # (which sorts first) still finds its micromamba backend.
          for script in $(printf '%s\n' install/*.py | LC_ALL=C sort); do
            echo "::group::${script}"
            python3 "${script}" reinstall
            python3 "${script}" test
            echo "::endgroup::"
          done

  # Unit tests: pins env.sh / install/*.py artifacts to their source modules
  # and exercises the env-derivation logic.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.10
      - run: pixi run test

  generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.10
      - run: pixi run format
      - run: pixi run compile
      - name: verify formatted and generated files are committed
        run: git diff --exit-code

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.10
      - run: pixi run lint

  # Dead-code check: vulture verifies no unused functions/classes leak into
  # the compiled standalone scripts under install/.
  lint-compiled:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.10
      - run: pixi run lint-compiled

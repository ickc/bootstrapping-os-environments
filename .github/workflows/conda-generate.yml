name: conda-generate

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: prefix-dev/setup-pixi@v0.10.0

      - name: Generate conda environment files
        run: pixi run conda-generate

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/conda-generate
          delete-branch: true
          title: "chore: regenerate conda environment files"
          commit-message: "chore: regenerate conda environment files"
          draft: true
          body: |
            Regenerated conda environment files with `pixi run conda-generate`.

            This PR is opened automatically by the weekly conda-generate workflow.
